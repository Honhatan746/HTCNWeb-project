<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News List</title>
    <link rel="stylesheet" href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <style>
        
        /* Tùy chỉnh màu sắc dựa trên tiêu đề bài báo (Heading) */
.category-tag {
    display: inline-block;
    padding: 4px 15px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    background-color: #B999FD; /* Vàng mặc định */
    color: white;
    border: 1px solid #6139bf;
}
.featured-news-item {
    transition: transform 0.3s ease;
    border: 1px solid rgba(0,0,0,0.05);
}

.featured-news-item:hover {
    transform: scale(1.01);
    border-color: #3182ce;
}
.news-vintage-theme {
background-color: #f9f7f2;
    font-family: 'Playfair Display', serif;
    color: #1a1a1a;
}

.border-bottom-dark {
    border-bottom: 2px solid #333;
}

.section-label {
    font-size: 1.5rem;
    font-weight: 900;
    text-transform: uppercase;
    border-bottom: 1px solid #333;
    display: inline-block;
}

/* Hiệu ứng khung ảnh có bóng đổ cứng */
.img-frame {
    background: #fff;
    padding: 10px;
    border: 1px solid #333;
    box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.img-frame:hover {
    transform: translate(-4px, -4px);
    box-shadow: 12px 12px 0px rgba(0,0,0,0.15);
}


.underline-title {
    position: relative;
    display: inline-block;
}
.read-next-news{
    color: #AB2A8B;
}
.underline-title::after {
    content: "";
    position: absolute;
    bottom: 5px;
    left: 0;
    width: 100%;
    height: 8px;
    background: rgba(255, 99, 71, 0.3); /* Màu gạch chân nhạt */
    z-index: -1;
}

.font-xs { font-size: 0.75rem; }
.fw-black { font-weight: 900; }
/* Nút Read More tinh tế */
.btn-read-more {
    font-size: 0.8rem;
    font-weight: 700;
    text-decoration: none;
    color: #333;
    border-bottom: 1px solid #333;
    transition: 0.3s;
}

.btn-read-more:hover {
    color: #ff6347;
    border-color: #ff6347;
}

/* Custom Navigation Buttons */
.custom-nav .btn {
    letter-spacing: 1px;
    font-size: 0.7rem;
    padding: 5px 15px;
}

/* Hiệu ứng mờ dần khi chuyển bài báo */
.carousel-fade .carousel-item {
    transition-duration: 0.8s;
}

/* Đảm bảo chiều cao các slide bằng nhau */
.carousel-inner {
    min-height: 500px;
}
.pre-style{
    border: 1px solid #AB2A8B;
    transition: all .3s ease;
}
.pre-style:hover{
    background-color: #AB2A8B;
    color: white;
    transform: translateY(-3px);
}
.next-style{
    background-color: #AB2A8B;
    color: white;
    transition: all .3s ease;
}
.next-style:hover{
    background-color: #AB2A8B;
    transform: translateY(-3px);
    color: white;
}
    </style>
</head>
<body class="news-vintage-theme">

    <main class="container mt-5">
        <div class="text-center mb-5">
            <h2 class="display-4 fw-black text-uppercase underline-title" style="color: #AB2A8B;">New Daily</h2>
        </div>

        <div class="row g-5">
<div class="col-lg-7 border-end-tablet">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom-dark pb-2">
        <h3 class="section-label m-0" style="border:none; color: #AB2A8B;">POPULAR LOOKS</h3>
        <div class="custom-nav">
            <button class="btn btn-sm pre-style rounded-0" type="button" data-bs-target="#newsSlider" data-bs-slide="prev">
                PREV
            </button>
            <button class="btn btn-sm next-style rounded-0" type="button" data-bs-target="#newsSlider" data-bs-slide="next">
                NEXT
            </button>
        </div>
    </div>

<div id="newsSlider" class="carousel slide" data-bs-ride="false">
    <div class="carousel-inner" id="newsSliderInner">
        <!-- Render News -->
    </div>
</div>
</div>

           <div class="col-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="section-label" style="color: #AB2A8B;">TIN MỚI NHẤT</h3>
        <div class="custom-nav d-flex gap-2">
            <button class="btn btn-sm  pre-style" type="button" data-bs-target="#hotNewsSlider" data-bs-slide="prev">←</button>
            <button class="btn btn-sm next-style" type="button" data-bs-target="#hotNewsSlider" data-bs-slide="next">→</button>
        </div>
    </div>

    <div id="hotNewsSlider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner" id="hotNewsSliderInner">
            </div>
    </div>
</div>
        </div>
    </main>
    <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/newsList.js"></script>
</body>
</html>
