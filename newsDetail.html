     <style>
        body { background-color: #f9f7f2;}
        
        /* Sidebar bên trái */
        .sidebar-news-list {
            position: sticky;
            top:90px;
            max-height: 90vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        .small-news-card {
            background: white;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .small-news-card:hover {
            border-color: #AB2A8B;
            transform: translateX(5px);
        }
        .small-news-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Nội dung chính bài báo */
        .news-main-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .news-main-content h1 {
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 20px;
        }
        .news-body-text {
            line-height: 1.8;
            font-size: 1.8rem;
            color: #4a5568;
        }
        .news-body-text img {
            max-width: 100%;
            border-radius: 20px;
            margin: 20px 0;
        }
    </style>
</head>
