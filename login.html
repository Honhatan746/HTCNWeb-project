<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Fashion - Transparent Style</title>
    <link href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsible.css">
    <link rel="stylesheet" href="./asset/icon/themify-icons-font/themify-icons/themify-icons.css">
</head>

<body class="bodyCustome">

    <div class="main-wrapper-login">
        <div class="right-login">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-login">Welcome Back</h1>
                <p class="text-muted">Đăng nhập vào cửa hàng thời trang của bạn</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="small fw-bold mb-1 text-login">EMAIL ADDRESS</label>
                    <input type="email" class="form-control login-name font-title" id="email"
                        placeholder="name@gmail.com">
                </div>
                <div class="mb-4">
                    <label class="small fw-bold mb-1 text-login">PASSWORD</label>
                    <div class="password-group position-relative">
                        <input type="password" class="form-control login-name font-title" id="password" placeholder="---">
                        <i class="ti-lock toggle-password" data-target="password"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-login-custom mb-3 font-text" id="signIn">Sign In</button>
            </form>

            <p class="text-center mt-3 font-text">
                Bạn chưa có tài khoản? <a href="./register.html" class=" fw-bold text-decoration-none text-login">Đăng
                    ký ngay</a>
            </p>
        </div>
        <div class="left-hollow">
            <div>
                <p class="text-uppercase fw-bold ls-2" style="letter-spacing: 4px;">A Wise Quote —</p>
                <p class="fst-italic opacity-75">"Simplicity is the ultimate sophistication."</p>
            </div>

            <div class="main-heading fw-bold">
                Get<br>Everything<br>You Want
            </div>

            <div class="small opacity-75">
                © 2026 Fashion Studio. All rights reserved.
            </div>
        </div>
    </div>

    <script src="./jquery/jquery-4.0.0.min.js"></script>
    <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/login.js"></script>
</body>

</html>
