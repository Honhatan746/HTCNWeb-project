<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Fashion - Transparent Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsible.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        /* 1. NỀN PHÍA SAU CÙNG (CÓ THỂ THAY BẰNG ẢNH TRẢI DÀI) */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url(./asset/image/Slide/01_-_banner_web_ngang_-_2500x991.jpg) top center / cover no-repeat;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            padding: 7rem;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgb(0 0 0 / 23%);
            ;
            /* chỉnh 0.3 -> 0.7 tùy độ tối */
            z-index: 0;
        }

        /* 2. KHUNG CHÍNH BAO QUANH */
        .main-wrapper {
            width: 1100px;
            max-width: 95%;
            height: 550px;
            display: flex;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            border: 9px solid #fff;
        }

        /* 3. PHẦN BÊN TRÁI: TRỐNG RỖNG (TRANSPARENT) */
        .left-hollow {
            font-size: 1.5rem;
            padding: 5.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            background: transparent;
        }

        .main-heading {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            line-height: 1;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
            /* Đổ bóng nhẹ để chữ nổi lên nền */
        }

        /* 4. PHẦN BÊN PHẢI: KHUNG ĐĂNG NHẬP (TRẮNG ĐỤC) */
        .right-login {
            font-size: 1.4rem;
            flex: 1;
            background: #ffffff;
            /* Màu trắng đặc để dễ nhập liệu */
            padding: 5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Tùy chỉnh Input */
        .login-name.form-control {
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #eee;
            background: #fdfdfd;
            margin-bottom: 20px;
            transition: all .3s ease;
        }

        .login-name.form-control:focus {
            box-shadow: 0px 0px 6px #8f5bff;
        }

        .btn-login-custom {
            color: #fff;
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: 0.3s;
            background-color: #8f5bff;
        }

        .btn-login-custom:hover {
            opacity: 0.8;
            transform: scale(0.98);
            color: white;
            background-color: #8f5bff;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 992px) {
            .main-wrapper {
                /* Cho phép chiều cao tự động co giãn theo nội dung form */
                height: auto;
                width: 100%;
                margin: 20px;
                border-radius: 30px;
                border: none;
            }

            .left-hollow {
                display: none !important;
            }

            .right-login {
                /* Chiếm toàn bộ chiều rộng của khung */
                flex: 1;
                border-radius: 30px;
                /* Bo tròn đều cả 4 góc trên mobile */
                padding: 40px 30px;
            }

            .main-heading {
                /* (Tùy chọn) Giảm size chữ nếu bạn muốn hiện lại sau này */
                font-size: 3rem;
            }
        }
        .text-login{
            color:  #8f5bff;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="right-login">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-login" >Welcome Back</h1>
                <p class="text-muted">Đăng nhập vào cửa hàng thời trang của bạn</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="small fw-bold mb-1 text-login" >EMAIL ADDRESS</label>
                    <input type="email" class="form-control login-name font-title" placeholder="name@fashion.com">
                </div>
                <div class="mb-4">
                    <label class="small fw-bold mb-1 text-login" >PASSWORD</label>
                    <input type="password" class="form-control login-name font-title" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-login-custom mb-3 font-text">Sign In</button>
            </form>

            <p class="text-center mt-5 small">
                Bạn chưa có tài khoản? <a href="./register.html" class=" fw-bold text-decoration-none text-login" >Đăng ký ngay</a>
            </p>
        </div>
        <div class="left-hollow">
            <div>
                <p class="text-uppercase fw-bold ls-2" style="letter-spacing: 4px;">A Wise Quote —</p>
                <p class="fst-italic opacity-75">"Simplicity is the ultimate sophistication."</p>
            </div>

            <div class="main-heading">
                Get<br>Everything<br>You Want
            </div>

            <div class="small opacity-75">
                © 2026 Fashion Studio. All rights reserved.
            </div>
        </div>



    </div>

</body>

</html>
