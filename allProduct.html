    <style>
        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .swatch:hover {
            transform: scale(1.3);
            border-color: #ff69b4;
        }

        .page-item.active .page-link {
            background-color: #ff69b4;
            border-color: #ff69b4;
        }

        .page-link {
            color: #333;
        }

        .shop-banner {
            height: 50vh;
            background: url('./asset/image/Slide/anh_tet.webp') center/cover no-repeat;
            position: relative;
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-filter {
            padding: 10px 25px;
            border: 2px solid #eee;
            background-color: #fff;
            color: #555;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
        }

        .btn-filter:hover {
            border-color: #ff69b4;
            color: #ff69b4;
        }

        .btn-filter.active {
            background-color: #ff69b4;
            border-color: #ff69b4;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>

<!-- Product -->
    <div class="product-page-container">
        <section class="shop-banner mb-5">
            <div class="banner-overlay d-flex align-items-center justify-content-center text-white">
                <div class="text-center">
                    <h1 class="display-4 fw-bold">TẤT CẢ SẢN PHẨM</h1>

                </div>
            </div>
        </section>

        <div class="container">
            <div class="filter-sort-bar d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                <div class="filter-group d-flex justify-content-center gap-3 mb-5">
                    <button class="btn-filter font-title active" onclick="filterCategory('all', this)">
                        Tất cả
                    </button>
                    <button class="btn-filter font-title" onclick="filterCategory('girlFashion', this)">
                        Bé Gái
                    </button>
                    <button class="btn-filter font-title" onclick="filterCategory('boyFashion', this)">

                <div class="sort-group d-flex align-items-center gap-2">
                    <label for="priceSort" class="text-nowrap font-title">Sắp xếp:</label>
                    <select id="priceSort" class="form-select w-auto font-title" onchange="sortProducts()">
                        <option value="default">Mặc định</option>
                        <option value="asc">Giá: Thấp đến Cao</option>
                        <option value="desc">Giá: Cao đến Thấp</option>
                    </select>
                </div>
            </div>

            <div class="row g-4" id="productGrid">
                <!-- Render product heres -->
            </div>

            <nav class="mt-5">
