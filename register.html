<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kidcore Fashion</title>
    <link rel="icon" href="asset/image/Logo/Logo.png">
    <link href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsible.css">
    <link rel="stylesheet" href="./asset/icon/themify-icons-font/themify-icons/themify-icons.css">
</head>

<body class="bodyCustome">

    <div class="main-wrapper">

        <div class="right-auth">
            <div class="mb-4">
                <h1 class="fw-bold m-0 text-login">Create Account</h1>
                <p class="text-muted small">Discover the latest collections now!</p>
            </div>

            <form>
                <div class="mb-2">
                    <label class=" fw-bold text-login mb-1 ">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="font-text form-control login-name " id="fullName"
                        placeholder="Nhập họ tên">
                    <span class="text-danger validReName"></span>
                </div>

                <div class="mb-2">
                    <label class=" fw-bold text-login mb-1 ">Phone Number <span class="text-danger">*</span></label>
                    <input type="tel" class=" font-text form-control login-name" id="phoneNumber"
                        placeholder="090x xxx xxx">
                    <span class="text-danger validRePhone"></span>
                </div>

                <div class="mb-2">
                    <label class="fw-bold text-login mb-1">
                        Address <span class="text-danger">*</span>
                    </label>

                    <div class="row">
                        <div class="col">
                            <select id="province" class="form-select font-text custom-select">
                                <option value="">Select Province/City</option>
                            </select>
                        </div>

                        <div class="col">
                            <select id="district" class="form-select font-text custom-select">
                                <option value="">Select District/County</option>
                            </select>
                        </div>
                        <div class="col">
                            <select id="ward" class="form-select font-text custom-select">
                                <option value="">Select Commune/Ward</option>
                            </select>
                        </div>
                    </div>
                    <span class="text-danger validReAddress"></span>
                </div>
                <div class="mb-2">
                    <label class=" fw-bold text-login mb-1 ">Email <span class="text-danger">*</span></label>
                    <input type="email" class=" font-text form-control login-name login-name" id="email"
                        placeholder="example@fashion.com">
                    <span class="text-danger validReEmail"></span>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label class=" fw-bold text-login mb-1 ">Password <span class="text-danger">*</span></label>
                        <div class="password-group position-relative">
                            <input type="password" id="password" class=" font-text form-control login-name"
                                placeholder="---">
                            <i class="ti-lock toggle-password" data-target="password"></i>
                        </div>
                        <span class="text-danger validPass"></span>
                    </div>
                    <div class="col-md-6">
                        <label class=" fw-bold text-login mb-1 ">Confirm <span class="text-danger">*</span></label>
                        <div class="password-group position-relative">
                            <input type="password" id="rePass" class=" font-text form-control  login-name"
                                placeholder="---">
                            <i class="ti-lock toggle-password" data-target="rePass"></i>
                        </div>
                        <span class="text-danger validRePass"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-login-custom mb-3 font-text" id="submit">Create an account</button>

                <p class="text-center small text-muted">
                    Do you already have an account?<a href="login.html" class="fw-bold text-login text-decoration-none">Login</a>
                </p>
            </form>
        </div>
        <div class="left-hollow">
            <div>
                <p class="text-uppercase fw-bold" style="letter-spacing: 4px; font-size: 1.4rem;">JOIN THE CLUB —</p>
                <p class="fst-italic opacity-75 font-text">"Fashion is part of the daily air..."</p>
            </div>

            <div class="main-heading fw-bold">
                Start<br>Your Fashion<br>Journey
            </div>

            <div class="small opacity-50">
                FASHION STUDIO © 2026
            </div>
        </div>

    </div>

    <script src="./jquery/jquery-4.0.0.min.js"></script>
    <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/register.js"></script>
</body>

</html>
